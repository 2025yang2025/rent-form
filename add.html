<script>
        document.getElementById('tenantForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const githubUrl = "https://api.github.com/repos/2025yang2025/rentroom/dispatches"; 
            
            // 🔒 這是你原本貼的 Token 兩段
            const rawPart1 = "github_pat_11BQS5FCQ0uQe5yUEdPwCb_"; 
            const rawPart2 = "6TLcLvVGpbbSha5BYxTrLO1ohJtnxAWWYVc4CzI0j2GMWHQTSAWLMZm785i"; 

            // 🧼 【核心修復：強制清洗法】
            // 用正規表示式 [^A-Za-z0-9_] 把所有「非英文、非數字、非底線」的隱形怪字元全部當場蒸發
            const cleanPart1 = rawPart1.replace(/[^A-Za-z0-9_]/g, '');
            const cleanPart2 = rawPart2.replace(/[^A-Za-z0-9_]/g, '');
            
            // 🧩 拼裝出絕對純淨的 Token
            const token = cleanPart1 + cleanPart2;

            const payload = {
                event_type: "add_tenant", 
                client_payload: {
                    action_type: "add_tenant",
                    location: document.getElementById('location').value,
                    room: document.getElementById('room').value,
                    name: document.getElementById('name').value,
                    rent: parseInt(document.getElementById('rent').value),
                    pay_day: parseInt(document.getElementById('pay_day').value),
                    contract_start: document.getElementById('contract_start').value,
                    contract_end: document.getElementById('contract_end').value,
                    last_paid_date: ""
                }
            };

            // 🛡️ 建立乾淨的 Header
            const myHeaders = new Headers();
            myHeaders.append("Accept", "application/vnd.github+json");
            myHeaders.append("Authorization", "Bearer " + token);
            myHeaders.append("Content-Type", "application/json");

            fetch(githubUrl, {
                method: 'POST',
                headers: myHeaders,
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.status === 204 || res.ok) {
                    alert('✅ 新房客資料已成功送出！後台 Actions 正在亮藍燈寫入 json...');
                    document.getElementById('tenantForm').reset();
                } else {
                    alert('❌ 傳送至 GitHub 失敗，錯誤代碼: ' + res.status);
                }
            })
            .catch(err => alert('連線發生錯誤: ' + err));
        });
    </script>
