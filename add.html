<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 新增房客資料</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">➕ 填寫新房客資料</h2>
        
        <form id="tenantForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">📍 地點 (如：台南)</label>
                <input type="text" id="location" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">🚪 房間號碼 (如：101房)</label>
                <input type="text" id="room" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">👤 房客姓名</label>
                <input type="text" id="name" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">💰 每月租金</label>
                <input type="number" id="rent" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">📅 每月繳租日 (填數字，如 5 號就填 5)</label>
                <input type="number" id="pay_day" min="1" max="31" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">📝 合約開始日</label>
                <input type="date" id="contract_start" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">⏳ 合約結束日</label>
                <input type="date" id="contract_end" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200">
                🚀 提交資料至系統
            </button>
        </form>
    </div>

    <script>
        // 🌟 請把下方引號內改成你 n8n 負責處理「新增房客」的 Webhook Production 網址
        const n8nAddTenantWebhookUrl = "https://n8ncenter-rentroom.onrender.com/webhook/rent-confirm"; 

        document.getElementById('tenantForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const payload = {
                action_type: "add_tenant",
                location: document.getElementById('location').value,
                room: document.getElementById('room').value,
                name: document.getElementById('name').value,
                rent: parseInt(document.getElementById('rent').value),
                pay_day: parseInt(document.getElementById('pay_day').value),
                contract_start: document.getElementById('contract_start').value,
                contract_end: document.getElementById('contract_end').value,
                last_paid_date: ""
            };

            fetch(n8nAddTenantWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    alert('✅ 資料已成功送出！後台正在寫入 tenants.json...');
                    document.getElementById('tenantForm').reset();
                } else {
                    alert('❌ 傳送至 n8n 失敗，錯誤代碼: ' + res.status);
                }
            })
            .catch(err => {
                alert('連線發生錯誤: ' + err);
            });
        });
    </script>
</body>
</html>
