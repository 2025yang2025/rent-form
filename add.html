<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 新增房客資料</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">➕ 填寫新房客資料</h2>
        
        <form id="tenantForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">📍 地點 (如：台南)</label>
                <input type="text" id="location" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">🚪 房間號碼 (如：101房)</label>
                <input type="text" id="room" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">👤 房客姓名</label>
                <input type="text" id="name" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">💰 每月租金</label>
                <input type="number" id="rent" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">📅 每月繳租日 (填數字)</label>
                <input type="number" id="pay_day" min="1" max="31" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">📝 合約開始日</label>
                <input type="date" id="contract_start" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">⏳ 合約結束日</label>
                <input type="date" id="contract_end" required class="mt-1 block w-full p-2 border border-gray-300 rounded-lg shadow-sm">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md">
                🚀 提交資料至系統
            </button>
        </form>
    </div>

    <script>
        document.getElementById('tenantForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const githubUrl = "https://api.github.com/repos/2025yang2025/rentroom/dispatches"; 
            
            // 🔒 隱身術：重新去後台生成的全新 Token，拆成兩半貼在這裡
            // ⚠️ 請記得在引號內換上你那組「完全沒在對話框曝光過」的新 Token 喔！
            const part1 = "github_pat_11BQS5FCQ0uQe5yUEdPwCb_"; 
            const part2 = "6TLcLvVGpbbSha5BYxTrLO1ohJtnxAWWYVc4CzI0j2GMWHQTSAWLMZm785i"; 

            // 🧩 執行時拼裝，避開 GitHub 機器人掃描
            const token = part1 + part2;

            const payload = {
                event_type: "add_tenant", // 👈 對應 yml 的新增房客暗號
                client_payload: {
                    action_type: "add_tenant",
                    location: document.getElementById('location').value,
                    room: document.getElementById('room').value,
                    name: document.getElementById('name').value,
                    rent: parseInt(document.getElementById('rent').value),
                    pay_day: parseInt(document.getElementById('pay_day').value),
                    contract_start: document.getElementById('contract_start').value,
                    contract_end: document.getElementById('contract_end').value,
                    last_paid_date: ""
                }
            };

            fetch(githubUrl, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.status === 204 || res.ok) {
                    alert('✅ 新房客資料已成功送出！後台 Actions 正在亮藍燈寫入 json...');
                    document.getElementById('tenantForm').reset();
                } else {
                    alert('❌ 傳送至 GitHub 失敗，錯誤代碼: ' + res.status);
                }
            })
            .catch(err => alert('連線發生錯誤: ' + err));
        });
    </script>
</body>
</html>
