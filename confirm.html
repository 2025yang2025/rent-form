<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>確認收租</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: var(--tg-theme-bg-color, #f5f5f5); color: var(--tg-theme-text-color, #333); }
    button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <h2 id="title">正在讀取資料...</h2>
  <p>點擊下方按鈕將自動登記今日為最後付款日</p>
  <button onclick="confirmRent()">💰 確認收到租金</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');
    const locationName = urlParams.get('location');

    document.getElementById('title').innerText = room ? `確認收到 ${room} 租金？` : '確認收到租金？';

    function confirmRent() {
      const n8nWebhookUrl = "https://n8ncenter-rentroom.onrender.com/webhook/83de2946-3566-45cb-acf2-bf5673b22fa6"; 

      const payload = {
        location: locationName,
        room: room
      };

      fetch(n8nWebhookUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (res.ok) {
          alert('✅ 已送出收租確認，系統正在後台更新紀錄...');
          tg.close();
        } else {
          alert('連線至中繼伺服器失敗，錯誤代碼: ' + res.status);
        }
      })
      .catch(err => alert('連線發生錯誤: ' + err));
    }
  </script>
</body>
</html>
